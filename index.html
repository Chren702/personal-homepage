<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Chren702 的个人主页与开源项目" />
    <meta name="color-scheme" content="light dark" />
    <title>Chren702 - 个人主页</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="切换深色模式">
      <span class="sun">☀</span><span class="moon">☾</span>
    </button>

    
    <main class="page-shell">
      <aside class="profile-card reveal">
        
        <img class="avatar" id="avatar-img" src="F:\pho\rr.png" alt="个人头像" />
        <div> 
          
        </div>
        <h1 id="profile-name">Chren702</h1>
        <p class="handle" id="profile-handle">@Chren702</p>
        <p class="bio" id="profile-bio">热爱创造，也喜欢记录生活。</p>

        <div class="profile-meta">
          <div><span aria-hidden="true">●</span><span id="profile-location">中国 · 重庆</span></div>
          <div><span aria-hidden="true">✦</span><span id="profile-role">独立开发者</span></div>
        </div>

        <div class="social-links" id="social-links" aria-label="社交链接"></div>
      </aside>

      <div class="content">
        <section class="intro-card panel reveal">
          <h2>👋 Welcome to my page</h2>
          <p id="intro-text">
            你好！我是 Chren702。这里是我的个人主页，展示了我的一些开源项目和日常动态。
          </p>
        </section>

        <section class="projects-panel panel reveal">
          <div class="section-heading">
            <h2>&lt;/&gt; 开源项目 <span>(Pinned Repositories)</span></h2>
            <a id="all-projects-link" href="https://github.com/Chren702" target="_blank" rel="noreferrer">查看全部 →</a>
          </div>
          <div class="project-grid" id="project-grid"></div>
        </section>
      </div>
    </main>

    <footer>© <span id="year"></span> <span id="footer-name">Chren702</span></footer>

    <script src="site-config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
